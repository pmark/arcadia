name: CI

on:
  push:
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm dashboard:build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ARCADIA_CONFIG_PATH: ${{ github.workspace }}/.tmp/isolated-arcadia-config.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm dashboard:build
      - run: pnpm test:e2e
      - name: Upload E2E failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            test-results/playwright
            playwright-report
            /tmp/arcadia-e2e-*/database
            /tmp/arcadia-e2e-*/*.log
          if-no-files-found: ignore
          retention-days: 7
